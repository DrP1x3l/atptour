function calcStats(matches,players){
  const s={};
  players.forEach(p=>{s[p.id]={played:0,w:0,l:0,sW:0,sL:0,tbW:0,tbL:0,pts:0,slams:0,bagels:0,doms:0,streak:0,best:0,byT:{},bySn:{},bySurf:{hard:{w:0,l:0},clay:{w:0,l:0}},ptsHistory:[],form:[]};T.forEach(t=>{s[p.id].byT[t.id]={w:0,l:0};});});
  let cumPts={};players.forEach(p=>{cumPts[p.id]=0;});
  [...matches].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(m=>{
    const W=s[m.winner],L=s[m.loser];if(!W||!L)return;
    W.played++;L.played++;W.w++;L.l++;
    m.sets.forEach(st=>{if(st.winner===m.winner){W.sW++;L.sL++;}else{L.sW++;W.sL++;}if(st.isTb){if(st.winner===m.winner){W.tbW++;L.tbL++;}else{L.tbW++;W.tbL++;}}});
    const bag=m.sets.some(st=>(st.s1===0||st.s2===0)&&!st.isTb);
    const dom=m.sets.filter(st=>st.winner===m.winner).length===2&&m.sets.length===2;
    let wp=PT.win,lp=PT.lose;
    if(bag){wp+=PT.bagel;W.bagels++;}if(dom){wp+=PT.dom;W.doms++;}
    W.pts+=wp;L.pts+=lp;W.slams++;
    if(W.byT[m.tournament])W.byT[m.tournament].w++;if(L.byT[m.tournament])L.byT[m.tournament].l++;
    const sn=m.season;
    if(!W.bySn[sn])W.bySn[sn]={pts:0,w:0,l:0,slams:0};if(!L.bySn[sn])L.bySn[sn]={pts:0,w:0,l:0,slams:0};
    W.bySn[sn].pts+=wp;W.bySn[sn].w++;W.bySn[sn].slams++;L.bySn[sn].pts+=lp;L.bySn[sn].l++;
    const surfType=T.find(t=>t.id===m.tournament)?.surfType||"hard";
    W.bySurf[surfType].w++;L.bySurf[surfType].l++;
    W.streak=W.streak>=0?W.streak+1:1;L.streak=L.streak<=0?L.streak-1:-1;
    W.best=Math.max(W.best,W.streak);
    cumPts[m.winner]+=wp;cumPts[m.loser]+=lp;
    W.ptsHistory.push(cumPts[m.winner]);L.ptsHistory.push(cumPts[m.loser]);
    W.form.push("V");L.form.push("P");
  });
  players.forEach(p=>{s[p.id].form=s[p.id].form.slice(-5);});
  return s;
}

function getAchievements(match,allMatches,players,stats){
  const badges=[];const w=stats[match.winner];const wP=players.find(p=>p.id===match.winner);
  const tName=T.find(t=>t.id===match.tournament)?.name||"";
  const tWins=allMatches.filter(m=>m.winner===match.winner&&m.tournament===match.tournament).length;
  if(tWins===1)badges.push(`🎉 Prima vittoria al ${tName}!`);
  if(w.streak===3)badges.push("🔥 3 vittorie di fila!");
  if(w.streak===5)badges.push("💀 5 vittorie di fila! Inarrestabile!");
  if(w.slams===1)badges.push("🏆 Primo Slam vinto!");
  const seasonWins={};allMatches.filter(m=>m.season===match.season&&m.winner===match.winner).forEach(m=>{if(!seasonWins[m.tournament])seasonWins[m.tournament]=true;});
  if(Object.keys(seasonWins).length===3)badges.push("👑 GRAND SLAM! Tutti e 3 i tornei!");
  const isDom=match.sets.filter(st=>st.winner===match.winner).length===2&&match.sets.length===2;
  if(isDom)badges.push("💪 Domination! Vittoria 2-0!");
  const hasBagel=match.sets.some(st=>(st.s1===0||st.s2===0)&&!st.isTb);
  if(hasBagel)badges.push("🥯 Bagel servito!");
  return badges;
}

function SponsorBar(){
  const[idx,setIdx]=useState(0);
  const[fade,setFade]=useState(true);
  const sponsors=[
    {src:SP_EMIRATES,bg:"#fff"},
    {src:SP_ROLEX,bg:"#fff"},
    {src:SP_WILSON,bg:"#fff"},
    {src:SP_LAVAZZA,bg:"#fff"},
  ];
  useEffect(()=>{const iv=setInterval(()=>{setFade(false);setTimeout(()=>{setIdx(p=>(p+1)%sponsors.length);setFade(true);},500);},5000);return()=>clearInterval(iv);},[]);
  return(
    <div style={{margin:"0 18px 10px",borderRadius:"16px",overflow:"hidden",background:sponsors[idx].bg,height:"72px",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.5s ease"}}>
      <img src={sponsors[idx].src} alt="" style={{height:"52px",objectFit:"contain",maxWidth:"85%",opacity:fade?1:0,transition:"opacity 0.5s ease"}}/>
    </div>
  );
}

function Nav({page,go}){
  const its=[{id:"dash",l:"Home",e:"⚡"},{id:"new",l:"Match",e:"🎾"},{id:"hist",l:"Storico",e:"📋"},{id:"albo",l:"Albo",e:"🏆"},{id:"prof",l:"Profili",e:"👤"},{id:"cfg",l:"Setup",e:"⚙️"}];
  return(<nav style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"0 4px max(6px, env(safe-area-inset-bottom))",background:"rgba(10,9,8,0.92)",borderTop:"1px solid var(--border)",position:"fixed",bottom:0,left:0,right:0,zIndex:100,backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)"}}>{its.map(i=>{const active=page===i.id;return(<button key={i.id} onClick={()=>go(i.id)} className="btn-press" style={{background:"none",border:"none",color:active?"var(--blue)":"var(--text3)",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",cursor:"pointer",padding:"0",fontFamily:"var(--font)",borderRadius:"0",position:"relative",width:`${100/its.length}%`,paddingTop:"10px",paddingBottom:"6px"}}>
    {active&&<div style={{position:"absolute",top:"0",left:"25%",right:"25%",height:"2px",borderRadius:"0 0 2px 2px",background:"var(--gold)",boxShadow:"0 2px 8px rgba(212,168,67,0.5)"}}/>}
    <span style={{fontSize:"18px",filter:active?"drop-shadow(0 0 6px rgba(212,168,67,0.4))":"none",transition:"filter 0.2s"}}>{i.e}</span>
    <span style={{fontWeight:active?800:600,fontSize:"9px",letterSpacing:".3px",transition:"color 0.2s"}}>{i.l}</span>
  </button>);})}</nav>);
}

function Hdr({season,players,stats}){
  const ranking=players.map(p=>({id:p.id,pts:stats[p.id]?.pts||0})).sort((a,b)=>b.pts-a.pts);
  const n1=ranking[0];const n1P=players.find(p=>p.id===n1?.id);const has=n1&&n1.pts>0;
  return(<header style={{paddingTop:"max(16px, env(safe-area-inset-top))",paddingLeft:"20px",paddingRight:"20px",paddingBottom:"10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <div style={{width:"70px",textAlign:"center",flexShrink:0}}>{has&&n1P?(<div className="float-avatar"><div style={{position:"relative",display:"inline-block"}}><Av src={n1P.avatar} size={34}/><div style={{position:"absolute",top:"-8px",right:"-10px",fontSize:"12px"}}>👑</div></div><div style={{fontFamily:"var(--font)",fontSize:"8px",color:"var(--gold)",fontWeight:800,marginTop:"3px",letterSpacing:"1px"}}>N°1</div></div>):(<div style={{fontSize:"22px",opacity:.2}}>🎾</div>)}</div>
    <div style={{flex:1,textAlign:"center"}}><img src={ATP_LOGO} alt="ATP Tour" style={{height:"52px",objectFit:"contain"}}/></div>
    <div style={{width:"70px",textAlign:"center",flexShrink:0}}>
      <div style={{width:"46px",margin:"0 auto",borderRadius:"10px",overflow:"hidden",background:"var(--card)",border:"1px solid var(--border)"}}>
        <div style={{background:"var(--gold)",padding:"2px 0",fontFamily:"var(--font)",fontSize:"8px",fontWeight:800,color:"var(--bg)",letterSpacing:"1.5px",textTransform:"uppercase"}}>{["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"][new Date().getMonth()]}</div>
        <div style={{padding:"4px 0 5px",fontFamily:"var(--mono)",fontSize:"20px",fontWeight:700,color:"var(--text)",lineHeight:1}}>{new Date().getDate()}</div>
      </div>
      <div style={{fontFamily:"var(--font)",fontSize:"11px",color:"var(--gold)",fontWeight:800,marginTop:"5px",letterSpacing:"1.5px"}}>S{season}</div>
    </div>
  </header>);
}

function SL({children}){return <div style={{fontFamily:"var(--font)",fontSize:"11px",fontWeight:800,color:"var(--text3)",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"12px"}}>{children}</div>;}
function MRow({m,players}){const wi=players.find(p=>p.id===m.winner),lo=players.find(p=>p.id===m.loser),t=T.find(t=>t.id===m.tournament);if(!wi||!lo||!t)return <div/>;const sc=m.sets.map(s=>{const a=m.winner===s.p1?s.s1:s.s2,b=m.winner===s.p1?s.s2:s.s1;return`${a}–${b}`;}).join("  ");return(<div style={{display:"flex",alignItems:"center",gap:"12px"}}><div style={{width:"4px",height:"38px",borderRadius:"2px",background:t.color,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{fontFamily:"var(--font)",fontSize:"14px",fontWeight:800,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wi.avatar&&wi.avatar.startsWith("data:")?"":(wi.avatar+" ")}{wi.name} <span style={{color:"var(--blue)",fontSize:"10px"}}>W</span><span style={{color:"var(--text3)",margin:"0 5px",fontSize:"11px"}}>vs</span>{lo.avatar} {lo.name}</div><div style={{fontFamily:"var(--font)",fontSize:"10px",color:"var(--text3)",marginTop:"3px"}}>{t.icon} {t.name} · S{m.season} · {m.date}</div></div><div style={{fontFamily:"var(--mono)",fontSize:"12px",fontWeight:700,color:"var(--text2)",flexShrink:0}}>{sc}</div></div>);}

// Confetti
function Confetti(){const colors=["#3B82F6","#F59E0B","#22C55E","#EF4444","#A855F7","#EC4899"];return(<div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:10}}>{Array.from({length:50}).map((_,i)=>{const left=Math.random()*100;const delay=Math.random()*2;const dur=2+Math.random()*3;const size=6+Math.random()*6;const color=colors[Math.floor(Math.random()*colors.length)];return<div key={i} className="confetti" style={{left:`${left}%`,top:"-10px",width:`${size}px`,height:`${size}px`,background:color,animationDuration:`${dur}s`,animationDelay:`${delay}s`,borderRadius:Math.random()>.5?"50%":"2px"}}/>;})}</div>);}

// Mini chart
function MiniChart({data1,data2,name1,name2}){
  const[sel,setSel]=useState(null);
  if(!data1.length&&!data2.length)return <div/>;
  const all=[...data1,...data2];const mx=Math.max(...all,1);const h=90;const w=280;const pad=5;
  const len=Math.max(data1.length,data2.length);const step=w/(Math.max(len-1,1));
  function path(d){if(!d.length)return"";return d.map((v,i)=>`${i===0?"M":"L"}${pad+i*step},${h-((v/mx)*(h-10))}`).join(" ");}
  function dots(d,color,isP){return d.map((v,i)=>{const cx=pad+i*step;const cy=h-((v/mx)*(h-10));const active=sel===i;return(<circle key={i} cx={cx} cy={cy} r={active?5:3} fill={active?color:"transparent"} stroke={color} strokeWidth={active?2:isP?0:1.5} style={{cursor:"pointer"}} onClick={()=>setSel(sel===i?null:i)}/>);});}
  const v1=sel!==null&&data1[sel]!==undefined?data1[sel]:null;
  const v2=sel!==null&&data2[sel]!==undefined?data2[sel]:null;
  return(<div>
    {sel!==null&&(v1!==null||v2!==null)&&(<div style={{display:"flex",justifyContent:"center",gap:"16px",marginBottom:"8px"}}>{v1!==null&&<div style={{fontFamily:"var(--mono)",fontSize:"12px",fontWeight:700,color:"var(--gold)"}}>{name1}: {v1.toLocaleString()}</div>}{v2!==null&&<div style={{fontFamily:"var(--mono)",fontSize:"12px",fontWeight:700,color:"var(--text3)"}}>{name2}: {v2.toLocaleString()}</div>}</div>)}
    <svg viewBox={`0 0 ${w+pad*2} ${h+24}`} style={{width:"100%",height:"auto"}}>
      {sel!==null&&<line x1={pad+sel*step} y1={0} x2={pad+sel*step} y2={h} stroke="var(--border2)" strokeWidth="1" strokeDasharray="3 3"/>}
      <path d={path(data1)} fill="none" stroke="var(--gold)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <path d={path(data2)} fill="none" stroke="var(--text3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4 4"/>
      {dots(data1,"var(--gold)",false)}
      {dots(data2,"var(--text3)",true)}
      <text x={pad} y={h+18} fill="var(--gold)" fontSize="9" fontFamily="var(--font)" fontWeight="700">{name1}</text>
      <text x={w+pad} y={h+18} fill="var(--text3)" fontSize="9" fontFamily="var(--font)" fontWeight="700" textAnchor="end">{name2}</text>
    </svg>
    <div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",textAlign:"center",marginTop:"4px",opacity:.6}}>Tocca un punto per vedere il dettaglio</div>
  </div>);
}

function Dash({state,stats}){
  const{players,matches}=state;
  const ranking=players.map(p=>({id:p.id,pts:stats[p.id]?.pts||0})).sort((a,b)=>b.pts-a.pts).map((r,i)=>({...r,pos:i+1}));
  const hh=players.length>=2?getH2H(matches,players[0].id,players[1].id):null;
  const last=matches.length>0?matches[matches.length-1]:null;
  const sSlams=T.map(t=>{const m=matches.find(ma=>ma.tournament===t.id&&ma.season===state.season);return{...t,played:!!m,wName:m?players.find(p=>p.id===m.winner)?.name:null};});
  const sW={};matches.filter(m=>m.season===state.season).forEach(m=>{if(!sW[m.winner])sW[m.winner]=new Set();sW[m.winner].add(m.tournament);});
  const gs=Object.entries(sW).find(([,s])=>s.size===3);
  return(
    <div className="fade-in" style={{padding:"0 18px 100px"}}>
      {/* Hero N°1 Card */}
      {matches.length>0&&ranking[0]&&(()=>{const n1=players.find(pl=>pl.id===ranking[0].id);const n1s=stats[n1.id];const isImg=n1.avatar&&n1.avatar.startsWith("data:");return(
        <div className="squircle" style={{marginBottom:"18px",padding:"0",overflow:"hidden",background:"linear-gradient(160deg,#1a1714,#141210)",border:"1px solid rgba(212,168,67,0.12)",position:"relative"}}>

  if(step==="confirm"){const wId=sets.filter(s=>s.winner===p1.id).length===2?p1.id:p2.id;const wp=players.find(p=>p.id===wId);const td=T.find(t=>t.id===tourn);return(<div className="fade-in" style={{padding:"0 18px 100px",textAlign:"center"}}><div style={{marginTop:"30px",marginBottom:"28px"}}><div style={{fontSize:"60px",marginBottom:"12px"}}>🏆</div><div style={{fontFamily:"var(--font)",fontSize:"11px",fontWeight:800,color:td.color,letterSpacing:"3px",marginBottom:"10px"}}>{td.name.toUpperCase()}</div><div style={{marginBottom:"8px"}}><Av src={wp.avatar} size={56}/></div><div style={{fontFamily:"var(--font)",fontSize:"28px",fontWeight:900,color:"var(--gold)"}}>{wp.name}</div><div style={{fontFamily:"var(--font)",fontSize:"12px",color:"var(--text3)",marginTop:"4px",letterSpacing:"2px",fontWeight:700}}>CAMPIONE</div></div><div className="squircle" style={{padding:"22px",marginBottom:"28px"}}><div style={{display:"flex",justifyContent:"center",gap:"12px"}}>{sets.map((s,i)=>(<div key={i} style={{background:"var(--card2)",borderRadius:"14px",padding:"12px 18px"}}><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginBottom:"4px",letterSpacing:"1px",fontWeight:700}}>{s.set===3&&s.isTb?"STB":`SET ${s.set}`}</div><div style={{fontFamily:"var(--mono)",fontSize:"22px",fontWeight:700,color:"var(--text)"}}>{s.s1}–{s.s2}</div></div>))}</div></div><div style={{display:"flex",gap:"10px"}}><button onClick={()=>{setStep("setup");setSets([]);setUndoStack([]);}} className="btn-press" style={{flex:1,padding:"16px",borderRadius:"14px",border:"1px solid var(--border)",background:"transparent",color:"var(--text3)",fontWeight:700,fontSize:"14px",cursor:"pointer",fontFamily:"var(--font)"}}>Annulla</button><button onClick={saveM} className="btn-press" style={{flex:2,padding:"16px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#D4A843,#B08428)",color:"#fff",fontWeight:800,fontSize:"15px",cursor:"pointer",fontFamily:"var(--font)",boxShadow:"0 6px 24px rgba(212,168,67,0.25)"}}>Salva Risultato ✓</button></div></div>);}

  // VICTORY with confetti
  if(step==="victory"&&savedMatch){const wp=players.find(p=>p.id===savedMatch.winner)||p1;const td=T.find(t=>t.id===savedMatch.tournament)||T[0];const confettiEls=[];const colors=["#D4A843","#F5D78E","#B08428","#22C55E","#EF4444","#EC4899"];for(let i=0;i<40;i++){confettiEls.push(<div key={i} className="confetti" style={{left:(i*2.5)+'%',top:"-10px",width:(6+i%4)+"px",height:(6+i%4)+"px",background:colors[i%6],animationDuration:(2+i%3)+"s",animationDelay:(i*0.08)+"s",borderRadius:i%2===0?"50%":"2px"}}/>);}return(<div style={{padding:"0 18px 100px",textAlign:"center",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:1}}>{confettiEls}</div><div style={{position:"relative",zIndex:2}}><div style={{marginTop:"30px",marginBottom:"24px",position:"relative"}}>
    <div className="v-glow" style={{position:"absolute",top:"10px",left:"50%",transform:"translateX(-50%)",width:"120px",height:"120px",borderRadius:"50%",background:"radial-gradient(circle, rgba(212,168,67,0.25) 0%, transparent 70%)",pointerEvents:"none"}}/>
    <div className="v-trophy" style={{fontSize:"80px",marginBottom:"14px",position:"relative"}}>{"\u{1F3C6}"}</div>
    <div className="v-title" style={{fontFamily:"var(--font)",fontSize:"11px",fontWeight:800,color:td.color,letterSpacing:"4px",marginBottom:"12px"}}>{td.name.toUpperCase()}</div>
    <div className="v-avatar" style={{marginBottom:"10px"}}><Av src={wp.avatar} size={70}/></div>
    <div className="v-name" style={{fontFamily:"var(--font)",fontSize:"34px",fontWeight:900,color:"var(--gold)",textShadow:"0 0 30px rgba(212,168,67,0.3)"}}>{wp.name}</div>
    <div className="v-label" style={{fontFamily:"var(--font)",fontSize:"13px",color:"var(--gold)",marginTop:"8px",letterSpacing:"4px",fontWeight:800}}>CAMPIONE</div>
  </div>{badges.length>0&&(<div className="v-score" style={{marginBottom:"20px"}}>{badges.map((b,i)=>(<div key={i} className="badge-pop" style={{fontFamily:"var(--font)",fontSize:"14px",color:"var(--gold)",marginBottom:"8px",fontWeight:700,animationDelay:(1.6+i*0.3)+"s",opacity:0}}>{b}</div>))}</div>)}<div className="v-score squircle" style={{padding:"18px",marginBottom:"24px"}}><div style={{display:"flex",justifyContent:"center",gap:"12px"}}>{savedMatch.sets.map((s,i)=>(<div key={i} style={{background:"var(--card2)",borderRadius:"14px",padding:"10px 16px"}}><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginBottom:"3px",fontWeight:700}}>{s.set===3&&s.isTb?"STB":"SET "+(s.set)}</div><div style={{fontFamily:"var(--mono)",fontSize:"20px",fontWeight:700,color:"var(--text)"}}>{s.s1}–{s.s2}</div></div>))}</div></div><button onClick={()=>{setStep("setup");setSets([]);setUndoStack([]);setSavedMatch(null);setBadges([]);}} className="btn-press v-btn" style={{width:"100%",padding:"18px",borderRadius:"16px",border:"none",background:"linear-gradient(135deg,#D4A843,#B08428)",color:"#fff",fontWeight:800,fontSize:"16px",cursor:"pointer",fontFamily:"var(--font)",boxShadow:"0 6px 24px rgba(212,168,67,0.25)"}}>Continua →</button></div></div>);}

  return <div style={{padding:"40px 18px",textAlign:"center"}}><div style={{fontFamily:"var(--font)",color:"var(--text3)"}}>Caricamento...</div></div>;
}

// ─── HISTORY with delete ───
function Hist({state,setState}){
  const sorted=[...state.matches].sort((a,b)=>new Date(b.date)-new Date(a.date));const seasons=[...new Set(sorted.map(m=>m.season))].sort((a,b)=>b-a);
  const[delId,setDelId]=useState(null);
  function deleteMatch(id){const ns={...state,matches:state.matches.filter(m=>m.id!==id)};setState(ns);sv(ns);setDelId(null);}
  return(<div className="fade-in" style={{padding:"0 18px 100px"}}><SL>Storico Partite</SL>{!sorted.length&&<div style={{textAlign:"center",color:"var(--text3)",padding:"50px 0",fontFamily:"var(--font)",fontSize:"14px",fontWeight:600}}>Nessuna partita registrata</div>}{seasons.map(sn=>{const sm=sorted.filter(m=>m.season===sn);return(<div key={sn} style={{marginBottom:"20px"}}><div style={{fontFamily:"var(--font)",fontSize:"12px",fontWeight:800,color:"var(--blue)",marginBottom:"10px",display:"flex",alignItems:"center",gap:"8px"}}><div style={{padding:"3px 10px",borderRadius:"8px",background:"var(--bluesoft)",border:"1px solid rgba(59,130,246,0.12)"}}>Stagione {sn}</div><div style={{fontSize:"10px",color:"var(--text3)",fontWeight:600}}>{sm.length} {sm.length===1?"partita":"partite"}</div></div>{sm.map(m=>(<div key={m.id} className="squircle" style={{padding:"14px 16px",marginBottom:"8px"}}><MRow m={m} players={state.players}/><div style={{display:"flex",justifyContent:"flex-end",gap:"8px",marginTop:"10px",borderTop:"1px solid var(--border)",paddingTop:"10px"}}>{delId===m.id?(<><button onClick={()=>setDelId(null)} className="btn-press" style={{padding:"6px 14px",borderRadius:"8px",border:"1px solid var(--border)",background:"transparent",color:"var(--text3)",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>Annulla</button><button onClick={()=>deleteMatch(m.id)} className="btn-press" style={{padding:"6px 14px",borderRadius:"8px",border:"none",background:"var(--red)",color:"#fff",fontSize:"11px",fontWeight:800,cursor:"pointer",fontFamily:"var(--font)"}}>Conferma Elimina</button></>):(<button onClick={()=>setDelId(m.id)} className="btn-press" style={{padding:"6px 14px",borderRadius:"8px",border:"1px solid rgba(239,68,68,0.2)",background:"rgba(239,68,68,0.06)",color:"var(--red)",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>Elimina</button>)}</div></div>))}</div>);})}</div>);
}

// ─── ALBO D'ORO ───
function Albo({state}){
  const{matches,players}=state;const seasons=[...new Set(matches.map(m=>m.season))].sort((a,b)=>b-a);
  // Check grand slam per season
  function hasGS(sn){const sW={};matches.filter(m=>m.season===sn).forEach(m=>{if(!sW[m.winner])sW[m.winner]=new Set();sW[m.winner].add(m.tournament);});return Object.entries(sW).find(([,s])=>s.size===3);}
  if(!seasons.length)return(<div className="fade-in" style={{padding:"0 18px 100px"}}><SL>Albo d'Oro</SL><div style={{textAlign:"center",padding:"50px 16px"}}><div style={{fontSize:"48px",marginBottom:"14px",opacity:.4}}>🏆</div><div style={{fontFamily:"var(--font)",fontSize:"15px",fontWeight:700,color:"var(--text3)"}}>Nessun campione ancora</div></div></div>);
  return(<div className="fade-in" style={{padding:"0 18px 100px"}}><SL>Albo d'Oro</SL>{seasons.map(sn=>{const gs=hasGS(sn);const gsPlayer=gs?players.find(p=>p.id===gs[0]):null;return(<div key={sn} style={{marginBottom:"28px"}}>
    <div style={{fontFamily:"var(--font)",fontSize:"14px",fontWeight:800,color:"var(--text)",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}><div style={{padding:"5px 14px",borderRadius:"10px",background:"rgba(212,168,67,0.08)",border:"1px solid rgba(212,168,67,0.15)",color:"var(--gold)",fontWeight:800,fontSize:"13px"}}>Stagione {sn}</div>{gs&&<div style={{fontSize:"11px",color:"var(--gold)",fontWeight:700}}>👑 Grand Slam</div>}</div>
    {gs&&gsPlayer&&(<div style={{marginBottom:"10px",padding:"12px 16px",borderRadius:"14px",background:"linear-gradient(135deg,rgba(212,168,67,0.08),rgba(212,168,67,0.03))",border:"1px solid rgba(212,168,67,0.15)",display:"flex",alignItems:"center",gap:"12px",justifyContent:"center"}}><div><Av src={gsPlayer.avatar} size={34}/></div><div><div style={{fontFamily:"var(--font)",fontSize:"14px",fontWeight:900,color:"var(--gold)"}}>{gsPlayer.name}</div><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",letterSpacing:"2px",marginTop:"2px"}}>GRAND SLAM CHAMPION</div></div></div>)}
    <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>{T.map(t=>{const m=matches.find(ma=>ma.tournament===t.id&&ma.season===sn);const w=m?players.find(p=>p.id===m.winner):null;return(<div key={t.id} style={{padding:"16px 18px",display:"flex",alignItems:"center",gap:"14px",borderRadius:"16px",background:w?"var(--card)":"var(--card)",border:w?`1px solid ${t.color}25`:"1px solid var(--border)",boxShadow:w?`0 2px 12px ${t.color}08`:"none"}}>
      <div style={{width:"44px",height:"44px",borderRadius:"12px",background:t.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0,boxShadow:w?`0 4px 12px ${t.color}22`:"none"}}>{t.icon}</div>
      <div style={{flex:1}}><div style={{fontFamily:"var(--font)",fontSize:"14px",fontWeight:800,color:w?t.color:"var(--text3)"}}>{t.name}</div><div style={{fontFamily:"var(--font)",fontSize:"10px",color:"var(--text3)",marginTop:"2px"}}>{t.surf}</div></div>
      {w?(<div style={{textAlign:"right",display:"flex",alignItems:"center",gap:"8px"}}><div><div style={{fontFamily:"var(--font)",fontSize:"13px",fontWeight:900,color:"var(--text)"}}>{w.name}</div><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--gold)",marginTop:"2px"}}>👑 Campione</div></div><div><Av src={w.avatar} size={32}/></div></div>):(<div style={{fontFamily:"var(--font)",fontSize:"11px",color:"var(--text3)",fontStyle:"italic"}}>Da giocare</div>)}
    </div>);})}</div>
  </div>);})}</div>);
}

// ─── PROFILES ───
function Prof({state,stats}){
  return(<div className="fade-in" style={{padding:"0 18px 100px"}}><SL>Profili Giocatori</SL>{state.players.map(p=>{const s=stats[p.id];const wr=s.played>0?((s.w/s.played)*100).toFixed(0):"–";const hardW=s.bySurf.hard,clayW=s.bySurf.clay;const hardR=hardW.w+hardW.l>0?((hardW.w/(hardW.w+hardW.l))*100).toFixed(0):"–";const clayR=clayW.w+clayW.l>0?((clayW.w/(clayW.w+clayW.l))*100).toFixed(0):"–";
    return(<div key={p.id} className="squircle" style={{padding:"24px 20px",marginBottom:"14px",background:"linear-gradient(160deg,var(--card),#1a1714)"}}>
      {/* Header with big centered avatar */}
      <div style={{textAlign:"center",marginBottom:"22px"}}>
        <div style={{display:"inline-block",position:"relative",marginBottom:"10px"}}>
          <div style={{position:"absolute",inset:"-8px",borderRadius:"38px",background:"radial-gradient(circle, rgba(212,168,67,0.15) 0%, transparent 70%)",pointerEvents:"none"}}/>
          <Av src={p.avatar} size={100}/>
        </div>
        <div style={{fontFamily:"var(--font)",fontSize:"24px",fontWeight:900,color:"var(--text)"}}>{p.name}</div>
        <div style={{fontFamily:"var(--font)",fontSize:"11px",color:"var(--text3)",marginTop:"3px"}}>{s.w}V – {s.l}P · {s.played} partite</div>
      </div>
      {/* Hero numbers */}
      <div style={{display:"flex",gap:"10px",marginBottom:"18px"}}>
        <div style={{flex:1,background:"linear-gradient(135deg,rgba(212,168,67,0.1),rgba(212,168,67,0.04))",borderRadius:"16px",padding:"16px 10px",textAlign:"center",border:"1px solid rgba(212,168,67,0.12)"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"32px",fontWeight:700,color:"var(--gold)",lineHeight:1}}>{s.pts.toLocaleString()}</div>
          <div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginTop:"6px",letterSpacing:"2px",fontWeight:700}}>PUNTI ATP</div>
        </div>
        <div style={{flex:1,background:"var(--card2)",borderRadius:"16px",padding:"16px 10px",textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"32px",fontWeight:700,color:"var(--text)",lineHeight:1}}>{wr}<span style={{fontSize:"18px",color:"var(--text3)"}}>%</span></div>
          <div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginTop:"6px",letterSpacing:"2px",fontWeight:700}}>WIN RATE</div>
        </div>
        <div style={{flex:1,background:"var(--card2)",borderRadius:"16px",padding:"16px 10px",textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"32px",fontWeight:700,color:"var(--text)",lineHeight:1}}>{s.slams}</div>
          <div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginTop:"6px",letterSpacing:"2px",fontWeight:700}}>SLAM 🏆</div>
        </div>
      </div>
      {/* Secondary stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:"6px",marginBottom:"16px"}}>
        {[{l:"Set",v:`${s.sW}-${s.sL}`},{l:"TB",v:`${s.tbW}-${s.tbL}`},{l:"Streak",v:`${s.best}`},{l:"Bagel",v:`${s.bagels}`},{l:"Dom",v:`${s.doms}`}].map((b,i)=>(<div key={i} style={{background:"var(--card2)",borderRadius:"10px",padding:"8px 4px",textAlign:"center"}}><div style={{fontFamily:"var(--mono)",fontSize:"13px",fontWeight:700,color:"var(--text2)"}}>{b.v}</div><div style={{fontFamily:"var(--font)",fontSize:"7px",color:"var(--text3)",letterSpacing:".5px",textTransform:"uppercase",marginTop:"3px",fontWeight:700}}>{b.l}</div></div>))}
      </div>
      {/* Surface stats */}
      <div style={{marginBottom:"14px"}}><div style={{fontFamily:"var(--font)",fontSize:"8px",color:"var(--text3)",letterSpacing:"2px",marginBottom:"8px",fontWeight:700}}>WIN% PER SUPERFICIE</div><div style={{display:"flex",gap:"8px"}}><div className="squircle" style={{flex:1,padding:"10px 8px",textAlign:"center",border:"1px solid rgba(59,159,231,0.15)"}}><div style={{fontFamily:"var(--font)",fontSize:"10px",color:"#3B9FE7",fontWeight:800}}>Cemento</div><div style={{fontFamily:"var(--mono)",fontSize:"16px",fontWeight:700,color:"var(--text)",marginTop:"4px"}}>{hardR}%</div><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginTop:"2px"}}>{hardW.w}V–{hardW.l}P</div></div><div className="squircle" style={{flex:1,padding:"10px 8px",textAlign:"center",border:"1px solid rgba(212,97,43,0.15)"}}><div style={{fontFamily:"var(--font)",fontSize:"10px",color:"#D4612B",fontWeight:800}}>Terra Rossa</div><div style={{fontFamily:"var(--mono)",fontSize:"16px",fontWeight:700,color:"var(--text)",marginTop:"4px"}}>{clayR}%</div><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--text3)",marginTop:"2px"}}>{clayW.w}V–{clayW.l}P</div></div></div></div>
      <div><div style={{fontFamily:"var(--font)",fontSize:"8px",color:"var(--text3)",letterSpacing:"2px",marginBottom:"8px",fontWeight:700}}>PER TORNEO</div><div style={{display:"flex",gap:"6px"}}>{T.map(t=>{const ts=s.byT[t.id];return(<div key={t.id} className="squircle" style={{flex:1,padding:"8px 4px",textAlign:"center",border:`1px solid ${t.color}18`}}><div style={{fontSize:"13px"}}>{t.icon}</div><div style={{fontFamily:"var(--mono)",fontSize:"10px",fontWeight:600,color:"var(--text2)",marginTop:"3px"}}>{ts.w}V–{ts.l}P</div></div>);})}</div></div>
    </div>);})}</div>);
}

<div style={{fontFamily:"var(--font)",fontSize:"12px",color:"var(--gold)",marginBottom:"8px",fontWeight:700}}>Custom</div>
<div style={{display:"flex",gap:"10px",marginBottom:"16px"}}>{IMG_AVATARS.map((a,i)=>(<button key={"img"+i} onClick={()=>onSelect(a)} className="btn-press" style={{width:"60px",height:"60px",borderRadius:"16px",border:"none",cursor:"pointer",padding:0,overflow:"hidden",background:current===a?"rgba(212,168,67,0.15)":"var(--card2)",outline:current===a?"2px solid var(--gold)":"1px solid var(--border)"}}><img src={a} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></button>))}</div>
<div style={{fontFamily:"var(--font)",fontSize:"12px",color:"var(--text3)",marginBottom:"6px"}}>Persone</div><div style={{display:"grid",gridTemplateColumns:"repeat(10, 1fr)",gap:"6px",marginBottom:"14px"}}>{AVATAR_OPTIONS.slice(0,20).map(a=>(<button key={a} onClick={()=>onSelect(a)} className="btn-press" style={{width:"100%",aspectRatio:"1",borderRadius:"12px",border:"none",fontSize:"22px",cursor:"pointer",background:current===a?"var(--bluesoft)":"var(--card2)",outline:current===a?"2px solid var(--gold)":"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}>{a}</button>))}</div><div style={{fontFamily:"var(--font)",fontSize:"12px",color:"var(--text3)",marginBottom:"6px"}}>Animali</div><div style={{display:"grid",gridTemplateColumns:"repeat(10, 1fr)",gap:"6px"}}>{AVATAR_OPTIONS.slice(20).map(a=>(<button key={a} onClick={()=>onSelect(a)} className="btn-press" style={{width:"100%",aspectRatio:"1",borderRadius:"12px",border:"none",fontSize:"22px",cursor:"pointer",background:current===a?"var(--bluesoft)":"var(--card2)",outline:current===a?"2px solid var(--gold)":"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}>{a}</button>))}</div><button onClick={onClose} className="btn-press" style={{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#D4A843,#B08428)",color:"#fff",fontWeight:800,fontSize:"15px",cursor:"pointer",fontFamily:"var(--font)",marginTop:"18px",boxShadow:"0 6px 24px rgba(212,168,67,0.25)"}}>Conferma</button></div></div>);}

function Cfg({state,setState}){
  const[n1,setN1]=useState(state.players[0]?.name||"");const[n2,setN2]=useState(state.players[1]?.name||"");const[a1,setA1]=useState(state.players[0]?.avatar||AV_IMG1);const[a2,setA2]=useState(state.players[1]?.avatar||AV_IMG2);const[sn,setSn]=useState(state.season);const[ok,setOk]=useState(false);const[confirmReset,setConfirmReset]=useState(false);const[picker,setPicker]=useState(null);
  const inpS={background:"var(--card)",border:"1px solid var(--border)",borderRadius:"14px",padding:"14px 16px",color:"var(--text)",fontSize:"15px",width:"100%",fontFamily:"var(--font)",boxSizing:"border-box",outline:"none"};
  function doSave(){const ns={...state,players:[{...state.players[0],name:n1||"Giocatore 1",avatar:a1},{...state.players[1],name:n2||"Giocatore 2",avatar:a2}],season:sn};setState(ns);sv(ns);setOk(true);setTimeout(()=>setOk(false),2000);}
  function doReset(){if(!confirmReset){setConfirmReset(true);return;}const f=fr();setState(f);sv(f);setN1(f.players[0].name);setN2(f.players[1].name);setA1(AV_IMG1);setA2(AV_IMG2);setSn(f.season);setConfirmReset(false);}
  return(<div className="fade-in" style={{padding:"0 18px 100px"}}><SL>Impostazioni</SL>{[{idx:1,n:n1,setN:setN1,a:a1,label:"Giocatore 1"},{idx:2,n:n2,setN:setN2,a:a2,label:"Giocatore 2"}].map(({idx,n,setN,a,label})=>(<div key={idx} className="squircle" style={{padding:"22px",marginBottom:"12px"}}><div style={{fontFamily:"var(--font)",fontSize:"13px",color:"var(--text2)",marginBottom:"14px",fontWeight:800}}>{label}</div><div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"10px"}}><button onClick={()=>setPicker(idx)} className="btn-press" style={{width:"64px",height:"64px",borderRadius:"18px",border:"2px dashed var(--border2)",background:"var(--card2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden",padding:0}}><Av src={a} size={60}/></button><div style={{flex:1}}><input value={n} onChange={e=>setN(e.target.value)} placeholder="Nome" style={inpS}/></div></div><div style={{fontFamily:"var(--font)",fontSize:"10px",color:"var(--text3)",textAlign:"center",cursor:"pointer"}} onClick={()=>setPicker(idx)}>Tocca per cambiare personaggio</div></div>))}<div className="squircle" style={{padding:"22px",marginBottom:"12px"}}><div style={{fontFamily:"var(--font)",fontSize:"13px",color:"var(--text2)",marginBottom:"12px",fontWeight:800}}>Stagione Corrente</div><input type="number" value={sn} onChange={e=>setSn(parseInt(e.target.value)||sn)} style={inpS}/></div><button onClick={doSave} className="btn-press" style={{width:"100%",padding:"18px",borderRadius:"16px",border:"none",background:ok?"rgba(212,168,67,0.12)":"linear-gradient(135deg,#D4A843,#B08428)",color:ok?"var(--gold)":"#fff",fontWeight:800,fontSize:"16px",cursor:"pointer",fontFamily:"var(--font)",boxShadow:ok?"none":"0 6px 24px rgba(212,168,67,0.25)",transition:"all .3s",marginBottom:"12px"}}>{ok?"✓ Salvato!":"Salva Modifiche"}</button><div className="squircle" style={{padding:"22px",marginTop:"8px"}}><div style={{fontFamily:"var(--font)",fontSize:"12px",color:"var(--text3)",marginBottom:"14px",fontWeight:700}}>Zona Pericolosa</div>{!confirmReset?(<button onClick={doReset} className="btn-press" style={{width:"100%",padding:"14px",borderRadius:"14px",border:"1px solid rgba(239,68,68,0.2)",background:"rgba(239,68,68,0.06)",color:"var(--red)",fontWeight:700,fontSize:"14px",cursor:"pointer",fontFamily:"var(--font)"}}>Reset Totale</button>):(<div><div style={{fontFamily:"var(--font)",fontSize:"13px",color:"var(--red)",marginBottom:"12px",fontWeight:600}}>Tutti i dati verranno cancellati. Sei sicuro?</div><div style={{display:"flex",gap:"10px"}}><button onClick={()=>setConfirmReset(false)} className="btn-press" style={{flex:1,padding:"12px",borderRadius:"12px",border:"1px solid var(--border)",background:"transparent",color:"var(--text3)",fontWeight:700,fontSize:"13px",cursor:"pointer",fontFamily:"var(--font)"}}>Annulla</button><button onClick={doReset} className="btn-press" style={{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"var(--red)",color:"#fff",fontWeight:800,fontSize:"13px",cursor:"pointer",fontFamily:"var(--font)"}}>Conferma</button></div></div>)}</div><div style={{textAlign:"center",marginTop:"36px"}}><div style={{fontFamily:"var(--font)",fontSize:"9px",color:"var(--border2)",letterSpacing:"3px"}}>ATP TOUR v4.0</div></div>{picker&&<AvatarPicker current={picker===1?a1:a2} onSelect={a=>{if(picker===1)setA1(a);else setA2(a);setPicker(null);}} onClose={()=>setPicker(null)}/>}</div>);
}

function ATPTour(){
  const[state,setState]=useState(()=>ld()||fr());const[page,setPage]=useState("dash");
  useEffect(()=>{if(state)sv(state);},[state]);
  const stats=useMemo(()=>state?calcStats(state.matches,state.players):{},[state]);
  if(!state)return(<div style={{minHeight:"100vh",background:"#0A0908"}}></div>);
  return(<div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"var(--font)",maxWidth:"480px",margin:"0 auto",position:"relative",WebkitFontSmoothing:"antialiased"}}><style>{CSS}</style><Hdr season={state.season} players={state.players} stats={stats}/>{page==="dash"&&<Dash state={state} stats={stats}/>}{page==="new"&&<NewMatch state={state} setState={setState} go={setPage}/>}{page==="hist"&&<Hist state={state} setState={setState}/>}{page==="albo"&&<Albo state={state}/>}{page==="prof"&&<Prof state={state} stats={stats}/>}{page==="cfg"&&<Cfg state={state} setState={setState}/>}<Nav page={page} go={setPage}/></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<ATPTour/>);
</script>
